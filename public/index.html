<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sales Leaderboard</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="dashboard">
      <section class="topbar" aria-label="Leaderboard controls">
        <div><p class="eyebrow">VICIdial floor report</p><h1>Sales Leaderboard</h1></div>
        <div class="actions"><span id="sourceBadge" class="badge">Loading</span><button id="refreshButton" type="button">Refresh</button></div>
      </section>
      <section class="summary" aria-label="Leaderboard summary">
        <article><span>Top agent</span><strong id="topAgent">-</strong></article>
        <article><span>Total sales</span><strong id="totalSales">-</strong></article>
        <article><span>Best sales/hr</span><strong id="bestSalesHour">-</strong></article>
        <article><span>Last refresh</span><strong id="lastRefresh">-</strong></article>
      </section>
      <section class="leaderboard" aria-label="Agent rankings">
        <div class="table-head"><span>Rank</span><span>Agent</span><span>Sales</span><span>Sales/hr</span><span>Non-pause</span></div>
        <div id="leaderboardRows" class="rows" aria-live="polite"></div>
      </section>
      <p id="errorMessage" class="error" role="status"></p>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
